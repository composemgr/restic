# nginx proxy address - http://172.17.0.1:8111

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  restic:
    image: restic/restic:latest
    container_name: restic-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - restic
    ports:
      - "8111:8111"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    volumes:
      - ./volumes/config/restic:/config
      - ./volumes/data/restic:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8111"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  restic:
    external: false
